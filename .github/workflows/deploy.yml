name: Deploy

on:
  push:
    branches: [prod]
  workflow_dispatch:

# Prevent overlapping deploys; keep only the latest.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # `prebuild` regenerates src/config/cache/* indexes, then astro build -> dist/
      - name: Build
        run: pnpm build

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "${{ secrets.DEPLOY_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      # Mirror dist/ to the nginx-served web root (nginx runs in Docker on the host).
      - name: Deploy via rsync
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes" \
            ./dist/ "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_PATH }}"

      # Notify via ServerChan (Server酱) to WeChat after the pipeline finishes (success or failure).
      - name: Notify WeChat via ServerChan
        if: always()
        env:
          SENDKEY: ${{ secrets.SERVERCHAN_SENDKEY }}
          STATUS: ${{ job.status }}
          REPO: ${{ github.repository }}
          REF: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ "$STATUS" = "success" ]; then emoji="✅"; else emoji="❌"; fi
          desp=$(printf '**仓库**: %s\n**分支**: %s\n**提交**: `%s`\n**状态**: %s\n\n[查看运行详情](%s)' \
            "$REPO" "$REF" "$SHA" "$STATUS" "$RUN_URL")
          curl -s "https://sctapi.ftqq.com/${SENDKEY}.send" \
            --data-urlencode "title=${emoji} Portfolio 部署 ${STATUS}" \
            --data-urlencode "desp=${desp}"
